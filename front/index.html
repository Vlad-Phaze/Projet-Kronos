<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronos Backtester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }
        
        /* Header */
        .logo-section {
            margin-bottom: 60px;
        }
        
        .logo-section h1 {
            color: #4fc3f7;
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }
        
        .logo-section .tagline {
            color: #9e9e9e;
            font-size: 1.3em;
        }
        
        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        
        .nav-btn {
            padding: 20px 35px;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 200px;
            position: relative;
        }
        
        .nav-btn .icon {
            font-size: 2.5em;
        }
        
        .nav-btn .label {
            font-size: 1em;
        }
        
        /* Crypto Single */
        .nav-btn.crypto-single {
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 100%);
            color: #0a0e27;
        }
        
        .nav-btn.crypto-single:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(79, 195, 247, 0.4);
            border-color: #4fc3f7;
        }
        
        .nav-btn.crypto-single:active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(79, 195, 247, 0.6),
                        0 0 10px rgba(255, 255, 255, 0.5) inset;
            transform: translateY(-3px);
        }
        
        /* Crypto Multi */
        .nav-btn.crypto-multi {
            background: linear-gradient(135deg, #2a3f5f 0%, #1a2f4f 100%);
            color: #4fc3f7;
            border-color: #4fc3f7;
        }
        
        .nav-btn.crypto-multi:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(79, 195, 247, 0.3);
            background: linear-gradient(135deg, #3a4f6f 0%, #2a3f5f 100%);
        }
        
        .nav-btn.crypto-multi:active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(79, 195, 247, 0.6),
                        0 0 10px rgba(79, 195, 247, 0.3) inset;
            background: linear-gradient(135deg, #4a5f7f 0%, #3a4f6f 100%);
            transform: translateY(-3px);
        }
        
        /* Stock Single */
        .nav-btn.stock-single {
            background: linear-gradient(135deg, #2d8659 0%, #1a472a 100%);
            color: #fff;
        }
        
        .nav-btn.stock-single:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(45, 134, 89, 0.4);
            border-color: #2d8659;
        }
        
        .nav-btn.stock-single:active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(45, 134, 89, 0.6),
                        0 0 10px rgba(255, 255, 255, 0.3) inset;
            transform: translateY(-3px);
        }
        
        /* Stock Multi */
        .nav-btn.stock-multi {
            background: linear-gradient(135deg, #2d5a3d 0%, #1a3d2a 100%);
            color: #7cbb8f;
            border-color: #2d8659;
        }
        
        .nav-btn.stock-multi:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(45, 134, 89, 0.3);
            background: linear-gradient(135deg, #3d6a4d 0%, #2d5a3d 100%);
        }
        
        .nav-btn.stock-multi:active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(45, 134, 89, 0.6),
                        0 0 10px rgba(45, 134, 89, 0.3) inset;
            background: linear-gradient(135deg, #4d7a5d 0%, #3d6a4d 100%);
            transform: translateY(-3px);
        }
        
        /* Footer */
        footer {
            position: fixed;
            bottom: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="logo-section">
            <h1>KRONOS BACKTESTER</h1>
            <p class="tagline">Plateforme de backtesting SmartBot V2 - SO Multiplicator Method</p>
        </div>
        
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a href="configure_smartbot.html" class="nav-btn crypto-single">
                <span class="icon">🪙</span>
                <span class="label">Crypto Single</span>
            </a>
            <a href="run_multi_smartbot.html" class="nav-btn crypto-multi">
                <span class="icon">📊</span>
                <span class="label">Crypto Multi</span>
            </a>
            <a href="configure_smartbot_stocks.html" class="nav-btn stock-single">
                <span class="icon">📈</span>
                <span class="label">Stock Single</span>
            </a>
            <a href="run_multi_smartbot_stocks.html" class="nav-btn stock-multi">
                <span class="icon">📊</span>
                <span class="label">Stocks Multi</span>
            </a>
        </div>
    </div>
    
    <footer>
        <p>Kronos Backtester v2.0 - Powered by Binance & yfinance</p>
    </footer>
</body>
</html>
